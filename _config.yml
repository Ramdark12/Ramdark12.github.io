# Main Page Setup

title: Aaron Reyes's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Aaron Reyes
headline: headline message
description: >- # dont remove this line. this will ignore all new lines until the next section
I am a Mechatronics Engineering student with a strong focus on mechanical design and CAD development. 
I have hands-on experience designing and optimizing mechanical systems through projects such as FIRST Robotics Competition, 
where I have worked on drivetrains, gearboxes, and complex assemblies in real-world engineering environments.
I am particularly interested in product development, design for manufacturability (DFM), and the application of engineering standards such as GD&T.
I am currently preparing for the Certified SolidWorks Professional (CSWP) certification to further strengthen my technical skills and industry readiness.

